<script>
// ── ODOO CONFIG ──
const ODOO_URL = 'https://newempire.odoo.com';
const PROXY = 'https://pnd-proxy.vercel.app';
function proxyUrl(url){ const u = new URL(url); return PROXY + u.pathname + u.search; }
const ODOO_DB  = 'newempire';
const ODOO_USER = 'b45ct';
const ODOO_KEY  = '63cf6933dd137e43743ac80ca72d1e2ef14b61b2';

// Company IDs — will be resolved on first load
let companyMap = {pup: null, bf: null, wu: null};

// ── ODOO API ──
async function odooCall(model, method, args, kwargs={}) {
  const uid = await odooAuth();
  const res = await fetch(proxyUrl(ODOO_URL + '/web/dataset/call_kw'), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      jsonrpc: '2.0', method: 'call', id: 1,
      params: {
        model, method,
        args, kwargs,
        context: {},
        uid: uid,
        password: ODOO_KEY,
      }
    }),
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.data?.message || JSON.stringify(data.error));
  return data.result;
}

let _uid = null;
async function odooAuth() {
  if (_uid) return _uid;
  const res = await fetch(proxyUrl(ODOO_URL + '/web/session/authenticate'), {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      jsonrpc: '2.0', method: 'call', id: 1,
      params: {db: ODOO_DB, login: ODOO_USER, password: ODOO_KEY}
    }),
  });
  const data = await res.json();
  if (!data.result?.uid) throw new Error('Authentication failed');
  _uid = data.result.uid;
  return _uid;
}

// ── APP STATE ──
let mode='sales', atab='pup', curO=null, curCo=null, curSO=null;
const done=[];
let soN=1000;
let fProds=[], selOn=false, sel2d=false, selPay='Zelle', runTotal=0, discount=0, selProdPrice=null;

// Live data from Odoo
let salesOrders = {pup:[], bf:[], wu:[]};
let pndOrders   = {pup:[], bf:[], wu:[]};
let odooProducts = [];
let odooCustomers = [];

const PND_COS=[{id:'pup',name:'PUP',bc:'bp'},{id:'bf',name:'BF',bc:'bb'},{id:'wu',name:'WU',bc:'bw'},{id:'done',name:'Completed',bc:'bd'}];
const S_COS  =[{id:'pup',name:'PUP',bc:'bp'},{id:'bf',name:'BF',bc:'bb'},{id:'wu',name:'WU',bc:'bw'}];

const PAY_METHODS = ['Cash','CCC','CashApp','Zelle'];

// Payment journal map — update these IDs to match your Odoo journals
const JOURNAL_MAP = {
  'Cash':    16,
  'CCC':     17,
  'CashApp': 18,
  'Zelle':   19,
};

function fmt(n){return '$'+parseFloat(n||0).toFixed(2);}
function pill(l,v){return '<span class="pill'+(v>0?' hv':'')+'">'+l+':'+v+'</span>';}
function spill(s){const m={draft:'sp-d',confirmed:'sp-c',paid:'sp-p'};const l={draft:'Draft',confirmed:'Confirmed',paid:'Paid'};return '<span class="spill '+m[s]+'">'+l[s]+'</span>';}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function showLoading(msg='Loading...'){document.getElementById('loading').style.display='flex';document.getElementById('loading-msg').textContent=msg;}
function hideLoading(){document.getElementById('loading').style.display='none';}
function showErr(msg){const b=document.getElementById('err-bar');b.textContent=msg;b.style.display='block';setTimeout(()=>b.style.display='none',5000);}

// ── SYNC FROM ODOO ──
async function syncAll() {
  showLoading('Syncing with Odoo...');
  try {
    await odooAuth();
    await Promise.all([loadCompanies(), loadProducts(), loadCustomers()]);
    await Promise.all([loadSalesOrders(), loadDeliveries()]);
    document.getElementById('sync-bar').style.display='flex';
    document.getElementById('sync-msg').textContent='Last synced: '+new Date().toLocaleTimeString();
    renderDash();
  } catch(e) {
    showErr('Sync failed: '+e.message);
    renderDash();
  }
  hideLoading();
}

async function loadCompanies() {
  const cos = await odooCall('res.company','search_read',[[]], {fields:['id','name'], limit:50});
  cos.forEach(c => {
    const n = c.name.toUpperCase();
    if(n.includes('PUP')) companyMap.pup = c.id;
    else if(n.includes('BF'))  companyMap.bf  = c.id;
    else if(n.includes('WU'))  companyMap.wu  = c.id;
  });
}

async function loadProducts() {
  odooProducts = await odooCall('product.product','search_read',
    [[['sale_ok','=',true]]],
    {fields:['id','name','lst_price'], limit:200}
  );
}

async function loadCustomers() {
  odooCustomers = await odooCall('res.partner','search_read',
    [[['customer_rank','>',0]]],
    {fields:['id','name','street','city','state_id','zip'], limit:500}
  );
}

async function loadSalesOrders() {
  const fields = ['id','name','partner_id','state','amount_total','amount_residual',
    'x_studio_shipping_address_4','x_studio_pk','x_studio_c','x_studio_z','x_studio_d',
    'x_studio_on','x_studio_2day','carrier_id','order_line','company_id','date_order'];
  const orders = await odooCall('sale.order','search_read',
    [[['state','in',['draft','sale','done']]]],
    {fields, limit:200, order:'date_order desc'}
  );

  // Load order lines
  const lineIds = orders.flatMap(o=>o.order_line);
  let lines = [];
  if(lineIds.length) {
    lines = await odooCall('sale.order.line','search_read',
      [[['id','in',lineIds]]],
      {fields:['id','order_id','product_id','product_uom_qty','price_unit','price_subtotal'], limit:1000}
    );
  }
  const lineMap = {};
  lines.forEach(l => {
    if(!lineMap[l.order_id[0]]) lineMap[l.order_id[0]]=[];
    lineMap[l.order_id[0]].push(l);
  });

  salesOrders = {pup:[],bf:[],wu:[]};
  orders.forEach(o => {
    const coId = o.company_id[0];
    const coKey = Object.keys(companyMap).find(k=>companyMap[k]===coId);
    if(!coKey) return;
    const oLines = (lineMap[o.id]||[]).map(l=>({
      name: l.product_id[1],
      qty: l.product_uom_qty,
      price: l.price_unit,
      odooId: l.product_id[0]
    }));
    const stateMap = {draft:'draft', sale:'confirmed', done:'paid'};
    const isPaid = o.amount_residual===0 && o.amount_total>0;
    salesOrders[coKey].push({
      id: o.id,
      ref: o.name,
      customer: o.partner_id[1],
      address: o.x_studio_shipping_address_4 || '',
      products: oLines,
      carrier: o.carrier_id ? o.carrier_id[1] : 'UPS',
      on: !!o.x_studio_on,
      twoday: !!o.x_studio_2day,
      pk: o.x_studio_pk||0, c:o.x_studio_c||0, z:o.x_studio_z||0, d:o.x_studio_d||0,
      payMethod: 'Zelle',
      status: isPaid ? 'paid' : (o.state==='sale'?'confirmed':'draft'),
      date: (o.date_order||'').slice(0,10),
      subtotal: o.amount_total,
      discount: 0,
      total: o.amount_total,
      amountPaid: isPaid ? o.amount_total : 0,
      odooId: o.id,
    });
  });
}

async function loadDeliveries() {

      [[['id','in',moveIds]]],
      {fields:['id','picking_id','product_id','product_uom_qty'], limit:1000}
    );
  }
  const moveMap = {};
  moves.forEach(m=>{

  pndOrders = {pup:[],bf:[],wu:[]};
  picks.forEach(p=>{
    const coId = p.company_id[0];

function chQ(i,d){
  const p=curO.products[i];p.packed=Math.max(0,Math.min(p.demand,p.packed+d));const ip=p.packed===p.demand;
  document.getElementById('qv'+i).textContent=p.packed;document.getElementById('qv'+i).className='qv'+(ip?' full':'');
  const row=document.getElementById('pr'+i);if(ip)row.classList.add('pk');else row.classList.remove('pk');
  document.getElementById('mn'+i).disabled=p.packed===0;document.getElementById('pl'+i).disabled=ip;updP();

function updP(){
  const conf=curO.products.filter(p=>p.packed===p.demand).length;const tot=curO.products.length;const ap=conf===tot;
  document.getElementById('pf').style.width=Math.round((conf/tot)*100)+'%';

  document.getElementById('vh').innerHTML=ap?'All confirmed &mdash; ready to go':'Use + to count each item, then validate';

async function valOrder(){
  showLoading('Validating shipment...');
  try {
    await odooAuth();
    // Set done quantities
    const moves = await odooCall('stock.move','search_read',
      [[['picking_id','=',curO.odooId]]],
      {fields:['id','product_uom_qty'],limit:100}
    );
    // Validate the transfer
    await odooCall('stock.picking','button_validate',[[curO.odooId]],{});
    curO.done=true;done.unshift(curO);
    renderPndDet();renderTabs();
  } catch(e){
    // Try immediate transfer if validation needs it
    try {
      await odooCall('stock.picking','action_immediate_transfer',[[curO.odooId]],{});
      await odooCall('stock.picking','button_validate',[[curO.odooId]],{});
      curO.done=true;done.unshift(curO);
      renderPndDet();renderTabs();
    } catch(e2){
      showErr('Validation failed: '+e2.message);
    }
  }
  hideLoading();
}

async function markPaid(){
  const inp=document.getElementById('amt');
  const amount=Math.min(parseFloat(inp?inp.value:0)||curSO.total,curSO.total);
  showLoading('Registering payment...');
  try {
    await odooAuth();
    // Create invoice
    const invIds = await odooCall('sale.order','_create_invoices',[[curSO.odooId]],{});
    // Confirm invoice
    const invId = Array.isArray(invIds) ? invIds[0] : invIds;
    await odooCall('account.move','action_post',[[invId]],{});
    // Register payment
    const journalId = JOURNAL_MAP[curSO.payMethod] || 1;
    await odooCall('account.payment.register','create',[{
      amount: amount,
      journal_id: journalId,
      payment_date: new Date().toISOString().slice(0,10),
      communication: curSO.ref,
    }],{});
    curSO.amountPaid=amount;
    curSO.status='paid';
    renderSalesDet();renderTabs();
  } catch(e){ showErr('Payment failed: '+e.message); }
  hideLoading();
}

            ' style="width:100%;padding:12px 8px;font-size:14px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#111;font-family:inherit;text-align:center;">'+
        '</td>'+
        '<td style="width:50px;padding-right:6px;">'+
          '<input type="number" id="pqty" min="1" value="1"'+
            ' style="width:100%;padding:12px 4px;font-size:14px;font-weight:600;border:1px solid #ddd;border-radius:10px;background:#fff;color:#111;font-family:inherit;text-align:center;">'+
        '</td>'+
        '<td style="width:60px;">'+
          '<button onclick="addProd()" style="width:100%;padding:12px 0;font-size:14px;font-weight:600;border:1px solid #111;border-radius:10px;background:#111;color:#fff;cursor:pointer;font-family:inherit;">Add</button>'+
        '</td>'+
      '</tr>'+
    '</table>'+
    '<div class="fsec">Payment</div>'+
    '<div class="fpmg" id="fpm-g">'+PAY_METHODS.map(m=>'<button class="fpm" id="fpm-'+m+'" onclick="selFP(\''+m+'\')" style="'+(selPay===m?'background:#111;color:#fff;border-color:#111;':'')+'">'+m+'</button>').join('')+'</div>'+
    '<div class="fsec">Discount</div>'+
    '<div class="disc-wrap">'+
      '<div class="disc-lbl">Fixed amount off order total</div>'+
      '<div class="disc-row"><span class="disc-sym">$</span><input class="disc-input" type="number" id="disc-in" min="0" step="0.01" placeholder="0.00" oninput="updTotal()"></div>'+
      '<div class="disc-note" id="disc-note">No discount applied</div>'+
    '</div>'+
    '<div class="total-box">'+
      '<div class="total-row"><span class="total-lbl">Subtotal</span><span class="total-amt" id="run-sub">$0.00</span></div>'+
      '<div class="total-row" id="disc-row-display" style="display:none;"><span class="total-lbl" style="color:#ef4444;">Discount</span><span class="total-disc" id="run-disc">-$0.00</span></div>'+
      '<hr class="total-divider">'+
      '<div class="total-row"><span class="total-lbl" style="font-weight:600;color:#111;">Total</span><span class="total-final" id="run-total">$0.00</span></div>'+
    '</div>'+
    '<button class="subbtn" onclick="submitOrder()">Create Order</button>';
}

function srchProd(v){
  selProdPrice=null;
  const sugg=document.getElementById('psugg');if(!v){sugg.style.display='none';return;}
  const src = odooProducts.length ? odooProducts : [];
  const matches=src.filter(p=>p.name.toLowerCase().includes(v.toLowerCase())).slice(0,6);
  if(matches.length){
    sugg.innerHTML=matches.map(p=>'<div class="sri" onmousedown="pickProd(\''+p.name.replace(/'/g,'&#39;')+'\','+p.lst_price+','+p.id+')">'+p.name+' <span style="color:#888;font-size:12px;">('+fmt(p.lst_price)+')</span></div>').join('');
    sugg.style.display='block';
  } else sugg.style.display='none';
}
let selProdOdooId=null;
function pickProd(name,price,oid){
  document.getElementById('pname-in').value=name;document.getElementById('psugg').style.display='none';
  document.getElementById('pprice').value=price.toFixed(2);selProdPrice=price;selProdOdooId=oid;
}
function hideProdSug(){setTimeout(()=>{const s=document.getElementById('psugg');if(s)s.style.display='none';},200);}

function srchC(v){
  const r=document.getElementById('cr');if(!v){r.style.display='none';return;}
  const src=odooCustomers.length?odooCustomers.map(c=>c.name):[];
  const m=src.filter(c=>c.toLowerCase().includes(v.toLowerCase())).slice(0,5);
  r.innerHTML=m.map(c=>'<div class="sri" onmousedown="selC(\''+c.replace(/'/g,'&#39;')+'\')">'+c+'</div>').join('')+'<div class="sri new" onmousedown="selC(\''+v.replace(/'/g,'&#39;')+'\')">+ Create "'+v+'"</div>';
  r.style.display='block';
}
function selC(n){
  document.getElementById('cs').value=n;document.getElementById('cr').style.display='none';
  // Auto-fill address if known customer
  const found=odooCustomers.find(c=>c.name===n);
  if(found){
    const addr=[found.street,found.city,found.state_id?found.state_id[1]:'',found.zip].filter(Boolean).join(', ');
    document.getElementById('sa').value=addr;
  }
}
function hideCustSug(){setTimeout(()=>{const r=document.getElementById('cr');if(r)r.style.display='none';},200);}

function togF(f){
  if(f==='on'){selOn=!selOn;if(selOn)sel2d=false;applyTog('bt-2d',false,'','','');}
  else{sel2d=!sel2d;if(sel2d)selOn=false;applyTog('bt-on',false,'','','');}
  if(f==='on')applyTog('bt-on',selOn,'#fee2e2','#991b1b','#fca5a5');
  else applyTog('bt-2d',sel2d,'#fef3c7','#92400e','#fcd34d');
}
function applyTog(id,on,bg,color,border){
  const b=document.getElementById(id);if(!b)return;
  b.style.background=on?bg:'';b.style.color=on?color:'';b.style.borderColor=on?border:'';
}
function selFP(m){
  selPay=m;
  PAY_METHODS.forEach(x=>{
    const b=document.getElementById('fpm-'+x);if(!b)return;
    if(x===m){b.style.background='#111';b.style.color='#fff';b.style.borderColor='#111';}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });
}
function updTotal(){
  const disc=Math.max(0,parseFloat((document.getElementById('disc-in')||{}).value)||0);
  discount=disc;const finalTotal=Math.max(0,runTotal-disc);
  const subEl=document.getElementById('run-sub');if(subEl)subEl.textContent=fmt(runTotal);
  const totEl=document.getElementById('run-total');if(totEl)totEl.textContent=fmt(finalTotal);
  const discRow=document.getElementById('disc-row-display');const discAmt=document.getElementById('run-disc');const discNote=document.getElementById('disc-note');
  if(disc>0){if(discRow)discRow.style.display='flex';if(discAmt)discAmt.textContent='-'+fmt(disc);if(discNote)discNote.textContent=fmt(disc)+' off — new total: '+fmt(finalTotal);}
  else{if(discRow)discRow.style.display='none';if(discNote)discNote.textContent='No discount applied';}
}
function addProd(){
  const nameEl=document.getElementById('pname-in');const name=(nameEl.value||'').trim();if(!name){alert('Enter a product name.');return;}
  const qty=Math.max(1,parseInt(document.getElementById('pqty').value)||1);
  const priceEl=document.getElementById('pprice');const price=parseFloat(priceEl?priceEl.value:0)||0;
  fProds.push({name,qty,price,odooId:selProdOdooId});runTotal+=price*qty;
  nameEl.value='';if(priceEl)priceEl.value='';selProdPrice=null;selProdOdooId=null;document.getElementById('pqty').value='1';
  refreshLines();updTotal();
}
function refreshLines(){
  document.getElementById('plines').innerHTML=fProds.length?
    fProds.map((p,i)=>'<div class="pline"><div class="pline-i"><div class="pline-n">'+p.name+'</div><div class="pline-q">Qty: '+p.qty+' &middot; '+fmt(p.price*p.qty)+'</div></div><button class="pline-r" onclick="rmP('+i+')">&#215;</button></div>').join(''):
    '<div style="font-size:13px;color:#888;padding:2px 0;">No products added yet</div>';
}
function rmP(i){runTotal-=fProds[i].price*fProds[i].qty;fProds.splice(i,1);refreshLines();updTotal();}

async function submitOrder(){
  const cust=(document.getElementById('cs').value||'').trim();
  const addr=(document.getElementById('sa').value||'').trim();
  const car=document.getElementById('car').value;
  if(!cust){alert('Please enter a customer name.');return;}
  if(!addr){alert('Please enter a shipping address.');return;}
  if(!fProds.length){alert('Please add at least one product.');return;}
  const disc=Math.max(0,parseFloat((document.getElementById('disc-in')||{}).value)||0);
  const finalTotal=Math.max(0,runTotal-disc);
  showLoading('Creating order in Odoo...');
  try {
    await odooAuth();
    // Find or create partner
    let partnerId=null;
    const found=odooCustomers.find(c=>c.name===cust);
    if(found) partnerId=found.id;
    else {
      partnerId=await odooCall('res.partner','create',[{name:cust,street:addr,customer_rank:1}],{});
    }
    // Get company id
    const coId=companyMap[atab]||1;
    // Build order lines
    const orderLines=fProds.map(p=>[0,0,{
      product_id: p.odooId||false,
      name: p.name,
      product_uom_qty: p.qty,
      price_unit: p.price,
    }]);
    // Create sale order
    const soId=await odooCall('sale.order','create',[{
      partner_id: partnerId,
      company_id: coId,
      x_studio_shipping_address_4: addr,
      x_studio_pk: parseInt((document.getElementById('pf-PK')||{}).value)||0,
      x_studio_c: parseInt((document.getElementById('pf-C')||{}).value)||0,
      x_studio_z: parseInt((document.getElementById('pf-Z')||{}).value)||0,
      x_studio_d: parseInt((document.getElementById('pf-D')||{}).value)||0,
      x_studio_on: selOn,
      x_studio_2day: sel2d,
      order_line: orderLines,
    }],{});
    // Reload orders
    await loadSalesOrders();
    closeNew();
  } catch(e){ showErr('Failed to create order: '+e.message); }
  hideLoading();
}

function exportCSV(){
  const h=['Order Ref','SO','Company','Customer','Address','Carrier','Products','ON','2DAY'];
  const rows=done.map(o=>[o.ref,o.so,o.ref.split('/')[0],o.customer,'"'+o.address+'"',o.carrier,'"'+o.products.map(p=>p.name+' x'+p.demand).join(' | ')+'"',o.on?'Yes':'No',o.twoday?'Yes':'No'].join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='pnd_completed_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// ── INIT ──
renderDash();
syncAll();
// Auto-refresh every 3 minutes
setInterval(syncAll, 3*60*1000);
</script>
