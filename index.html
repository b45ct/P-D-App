function fmt(n){return '$'+parseFloat(n||0).toFixed(2);}
function pill(l,v){return '<span class="pill'+(v>0?' hv':'')+'">'+l+':'+v+'</span>';}
function spill(s){const m={draft:'sp-d',confirmed:'sp-c',paid:'sp-p'};const l={draft:'Draft',confirmed:'Confirmed',paid:'Paid'};return '<span class="spill '+m[s]+'">'+l[s]+'</span>';}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
function switchMode(m){mode=m;document.getElementById('mb-s').classList.toggle('active',m==='sales');document.getElementById('mb-p').classList.toggle('active',m==='pnd');atab='pup';renderDash();}
function renderDash(){renderTabs();renderPanel();}
function renderTabs(){
  const cos=mode==='pnd'?PND_COS:S_COS;
  document.getElementById('tabs').innerHTML=cos.map(co=>{
    const cnt=co.id==='done'?done.length:mode==='pnd'?pnd[co.id].filter(o=>!o.done).length:(sales[co.id]||[]).length;
    return '<div class="tab'+(atab===co.id?' active':'')+'" onclick="swTab(\''+co.id+'\')">'+co.name+'<span class="tbadge '+co.bc+'">'+cnt+'</span></div>';
  }).join('');
  document.getElementById('fab-row').innerHTML=mode==='sales'?'<div class="fab-row"><button class="fab" onclick="openNew()">+</button></div>':'';
}
function swTab(id){atab=id;renderTabs();renderPanel();}
function renderPanel(){mode==='pnd'?(atab==='done'?renderDone():renderPnd()):renderSales();}
function renderPnd(){
  const list=pnd[atab].filter(o=>!o.done);
  document.getElementById('panel').innerHTML=list.length?'<div class="ow">'+list.map(o=>pndCard(o,atab)).join('')+'</div>':'<div class="empty">All orders completed</div>';
}
function renderDone(){
  if(!done.length){document.getElementById('panel').innerHTML='<div class="empty">No completed orders yet</div>';return;}
  document.getElementById('panel').innerHTML='<div class="chdr"><span class="ctit">'+done.length+' shipped</span><button class="expbtn" onclick="exportCSV()">&#8595; Export CSV</button></div><div class="ow">'+done.map(o=>pndCard(o,'done')).join('')+'</div>';

function pndCard(o,co){
  const flags=[o.on?'<span class="fon">ON</span>':'',o.twoday?'<span class="f2d">2DAY</span>':''].filter(Boolean).join('');
  const conf=o.products.filter(p=>p.packed===p.demand).length;const isDone=co==='done';
  const safeRef=o.ref.replace(/\//g,'__');
  return '<div class="card'+(isDone?' done':'')+'"><div class="r1"><div><div class="oref">'+o.ref+'</div><div class="sub">'+o.so+'</div></div><div class="fgs">'+flags+'</div></div>'+
    '<div class="cust">'+o.customer+'</div><div class="addr">'+o.address+'</div><div class="cl"><span class="cdot"></span>'+o.carrier+'</div>'+
    '<div class="pills">'+pill('PK',o.pk)+pill('C',o.c)+pill('Z',o.z)+pill('D',o.d)+'</div>'+
    '<div class="cf">'+(isDone?'<span></span><span class="sbadge">Shipped</span>':'<span class="pnote">'+(conf>0?conf+'/'+o.products.length+' packed':'')+'</span><button class="vb" onclick="openPnd(\''+co+'\',\''+safeRef+'\')">View &rarr;</button>')+'</div></div>';

function renderSales(){

function salesCard(o,co){

  const ps=o.products.map(p=>p.name+' x'+p.qty).join(', ');

  return '<div class="card s'+o.status[0]+'"><div class="r1"><div><div class="oref">'+o.ref+'</div><div class="sub">'+o.date+'</div></div>'+spill(o.status)+'</div>'+

    '<div class="cl"><span class="cdot"></span>'+o.carrier+' &middot; '+o.payMethod+(partial?' &middot; <span style="color:#b45309;">Partial</span>':'')+'</div>'+

function pRow(p,i,locked){

function chQ(i,d){
  const p=curO.products[i];p.packed=Math.max(0,Math.min(p.demand,p.packed+d));const ip=p.packed===p.demand;

  const row=document.getElementById('pr'+i);if(ip)row.classList.add('pk');else row.classList.remove('pk');

function togF(f){
  if(f==='on'){selOn=!selOn;if(selOn)sel2d=false;applyTog('bt-2d',false,'','','');}
  else{sel2d=!sel2d;if(sel2d)selOn=false;applyTog('bt-on',false,'','','');}
  if(f==='on')applyTog('bt-on',selOn,'#fee2e2','#991b1b','#fca5a5');
  else applyTog('bt-2d',sel2d,'#fef3c7','#92400e','#fcd34d');
}
function applyTog(id,on,bg,color,border){
  const b=document.getElementById(id);if(!b)return;
  b.style.background=on?bg:'';b.style.color=on?color:'';b.style.borderColor=on?border:'';
}
function selFP(m){
  selPay=m;
  ['Cash','CCC','CashApp','Zelle'].forEach(x=>{
    const b=document.getElementById('fpm-'+x);if(!b)return;
    if(x===m){b.style.background='#111';b.style.color='#fff';b.style.borderColor='#111';}
    else{b.style.background='';b.style.color='';b.style.borderColor='';}
  });
}
function updTotal(){
  const disc=Math.max(0,parseFloat((document.getElementById('disc-in')||{}).value)||0);
  discount=disc;const finalTotal=Math.max(0,runTotal-disc);
  const subEl=document.getElementById('run-sub');if(subEl)subEl.textContent=fmt(runTotal);
  const totEl=document.getElementById('run-total');if(totEl)totEl.textContent=fmt(finalTotal);
  const discRow=document.getElementById('disc-row-display');const discAmt=document.getElementById('run-disc');const discNote=document.getElementById('disc-note');
  if(disc>0){if(discRow)discRow.style.display='flex';if(discAmt)discAmt.textContent='-'+fmt(disc);if(discNote)discNote.textContent=fmt(disc)+' off — new total: '+fmt(finalTotal);}
  else{if(discRow)discRow.style.display='none';if(discNote)discNote.textContent='No discount applied';}
}
function addProd(){
  const nameEl=document.getElementById('pname-in');const name=(nameEl.value||'').trim();if(!name){alert('Enter a product name.');return;}
  const qty=Math.max(1,parseInt(document.getElementById('pqty').value)||1);
  const priceEl=document.getElementById('pprice');const price=parseFloat(priceEl?priceEl.value:0)||0;
  fProds.push({name,qty,price});runTotal+=price*qty;
  nameEl.value='';if(priceEl)priceEl.value='';selProdPrice=null;document.getElementById('pqty').value='1';
  refreshLines();updTotal();
}
function refreshLines(){
  document.getElementById('plines').innerHTML=fProds.length?
    fProds.map((p,i)=>'<div class="pline"><div class="pline-i"><div class="pline-n">'+p.name+'</div><div class="pline-q">Qty: '+p.qty+' &middot; '+fmt(p.price*p.qty)+'</div></div><button class="pline-r" onclick="rmP('+i+')">&#215;</button></div>').join(''):
    '<div style="font-size:13px;color:#888;padding:2px 0;">No products added yet</div>';
}
function rmP(i){
  runTotal-=fProds[i].price*fProds[i].qty;fProds.splice(i,1);refreshLines();updTotal();
}
function submitOrder(){
  const cust=(document.getElementById('cs').value||'').trim();const addr=(document.getElementById('sa').value||'').trim();const car=document.getElementById('car').value;
  if(!cust){alert('Please enter a customer name.');return;}
  if(!addr){alert('Please enter a shipping address.');return;}
  if(!fProds.length){alert('Please add at least one product.');return;}
  const ref='S00'+soN++;const today=new Date().toISOString().slice(0,10);
  const disc=Math.max(0,parseFloat((document.getElementById('disc-in')||{}).value)||0);
  const finalTotal=Math.max(0,runTotal-disc);
  if(!sales[atab])sales[atab]=[];
  sales[atab].unshift({ref,customer:cust,address:addr,carrier:car,on:selOn,twoday:sel2d,
    pk:parseInt((document.getElementById('pf-PK')||{}).value)||0,
    c:parseInt((document.getElementById('pf-C')||{}).value)||0,
    z:parseInt((document.getElementById('pf-Z')||{}).value)||0,
    d:parseInt((document.getElementById('pf-D')||{}).value)||0,
    payMethod:selPay,status:'draft',date:today,subtotal:runTotal,discount:disc,total:finalTotal,amountPaid:0,
    products:fProds.map(p=>({name:p.name,qty:p.qty,price:p.price}))});
  closeNew();
}
function exportCSV(){
  const h=['Order Ref','SO','Company','Customer','Address','Carrier','Products','ON','2DAY'];
  const rows=done.map(o=>[o.ref,o.so,o.ref.split('/')[0],o.customer,'"'+o.address+'"',o.carrier,'"'+o.products.map(p=>p.name+' x'+p.demand).join(' | ')+'"',o.on?'Yes':'No',o.twoday?'Yes':'No'].join(','));
  const csv=[h.join(','),...rows].join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='pnd_completed_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}
renderDash();
