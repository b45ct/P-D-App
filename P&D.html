<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="P&D">
<meta name="mobile-web-app-capable" content="yes">
<title>P&amp;D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#111;}
.screen{display:none;}
.screen.active{display:block;min-height:100vh;}

/* Header */
.app-header{padding:16px 16px 0;background:#fff;border-bottom:1px solid #e5e5e5;position:sticky;top:0;z-index:20;}
.app-title{font-size:22px;font-weight:600;color:#111;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.app-title span{letter-spacing:-0.5px;}
.refresh-btn{padding:7px 14px;font-size:13px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#666;cursor:pointer;font-family:inherit;}
.refresh-btn:active{background:#f5f5f5;}

/* Tabs */
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex:1;min-width:70px;padding:12px 6px;text-align:center;font-size:13px;font-weight:500;color:#888;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit;}
.tab.active{color:#111;border-bottom:2px solid #111;}
.tab-badge{display:inline-block;font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;margin-left:4px;vertical-align:middle;}
.badge-pup{background:#dbeafe;color:#1e40af;}
.badge-bf{background:#dcfce7;color:#166534;}
.badge-wu{background:#ede9fe;color:#5b21b6;}
.badge-done{background:#dcfce7;color:#166534;}

/* Orders list */
.orders-wrap{padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.order-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px;border-left:4px solid #ef4444;}
.order-card.shipped{border-left:4px solid #22c55e;}
.order-row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:3px;}
.order-ref{font-size:14px;font-weight:600;color:#111;}
.order-so{font-size:11px;color:#888;margin-bottom:3px;}
.order-customer{font-size:13px;color:#555;margin-bottom:3px;}
.order-address{font-size:12px;color:#888;line-height:1.5;margin-bottom:6px;}
.carrier-line{font-size:12px;color:#555;margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.carrier-dot{width:7px;height:7px;border-radius:50%;background:#3b82f6;display:inline-block;flex-shrink:0;}
.flags{display:flex;gap:4px;flex-wrap:wrap;}
.flag-on{background:#fee2e2;color:#991b1b;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;}
.flag-2day{background:#fef3c7;color:#92400e;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;}
.packing-pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
.pack-pill{font-size:12px;padding:3px 9px;border-radius:6px;background:#f5f5f5;color:#888;border:1px solid #e5e5e5;}
.pack-pill.has-value{background:#dbeafe;color:#1e40af;border-color:#bfdbfe;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.progress-note{font-size:12px;color:#888;}
.view-btn{padding:10px 20px;font-size:13px;font-weight:500;border:1px solid #ddd;border-radius:8px;background:#fff;color:#111;cursor:pointer;font-family:inherit;}
.view-btn:active{background:#f5f5f5;}
.shipped-badge{font-size:12px;font-weight:600;padding:7px 14px;border-radius:8px;background:#dcfce7;color:#166534;}
.empty{padding:60px 16px;text-align:center;font-size:15px;color:#888;}
.empty-icon{font-size:40px;margin-bottom:12px;}

/* Completed header */
.completed-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 4px;}
.completed-title{font-size:14px;font-weight:600;color:#111;}
.export-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;font-size:13px;font-weight:600;border:1px solid #22c55e;border-radius:8px;background:#fff;color:#16a34a;cursor:pointer;font-family:inherit;}
.export-btn:active{background:#dcfce7;}

/* Detail screen */
.detail-topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid #e5e5e5;background:#fff;position:sticky;top:0;z-index:10;}
.back-btn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:1px solid #e5e5e5;border-radius:10px;background:#fff;cursor:pointer;font-size:20px;color:#111;flex-shrink:0;font-family:inherit;}
.back-btn:active{background:#f5f5f5;}
.detail-topbar-info{flex:1;min-width:0;}
.detail-ref{font-size:15px;font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.detail-sub{font-size:12px;color:#888;}

/* Info card */
.info-card{margin:12px 16px;background:#f9f9f9;border-radius:14px;border:1px solid #e5e5e5;overflow:hidden;}
.info-row{display:flex;align-items:flex-start;padding:11px 14px;border-bottom:1px solid #e5e5e5;}
.info-row:last-child{border-bottom:none;}
.info-label{font-size:11px;color:#888;width:76px;flex-shrink:0;padding-top:2px;text-transform:uppercase;letter-spacing:0.3px;}
.info-value{font-size:13px;font-weight:500;color:#111;flex:1;line-height:1.5;}
.carrier-badge{display:inline-flex;align-items:center;gap:5px;background:#dbeafe;color:#1e40af;font-size:12px;font-weight:600;padding:3px 10px;border-radius:99px;}
.flags-row{padding:10px 14px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid #e5e5e5;}
.pills-row{padding:10px 14px;display:flex;flex-wrap:wrap;gap:5px;}

/* Products section */
.section-label{font-size:11px;font-weight:600;color:#888;padding:14px 16px 6px;text-transform:uppercase;letter-spacing:0.5px;}
.progress-bar-wrap{margin:0 16px 12px;background:#e5e5e5;border-radius:99px;height:6px;overflow:hidden;}
.progress-bar-fill{height:6px;border-radius:99px;background:#22c55e;transition:width 0.3s;}
.product-list-wrap{background:#fff;border-radius:14px;margin:0 16px;border:1px solid #e5e5e5;overflow:hidden;}
.product-row{display:flex;align-items:center;padding:14px 16px;background:#fff;border-bottom:1px solid #e5e5e5;}
.product-row:last-child{border-bottom:none;}
.product-row.packed-row{background:#f0fdf4;}
.prod-info{flex:1;min-width:0;margin-right:12px;}
.prod-name{font-size:14px;font-weight:500;color:#111;margin-bottom:2px;}
.prod-need{font-size:12px;color:#888;}
.qty-control{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.qty-btn{width:44px;height:44px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#111;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.qty-btn:active{background:#f5f5f5;}
.qty-btn:disabled{opacity:0.25;cursor:not-allowed;}
.qty-display{text-align:center;min-width:44px;}
.qty-val{font-size:20px;font-weight:600;display:block;color:#888;}
.qty-val.full{color:#16a34a;}
.qty-of{font-size:11px;color:#aaa;}

/* Shipped banner */
.shipped-banner{margin:16px 16px 0;background:#f0fdf4;border:1px solid #86efac;border-radius:14px;padding:24px 16px;text-align:center;}
.shipped-banner-icon{font-size:36px;margin-bottom:10px;}
.shipped-banner-title{font-size:17px;font-weight:600;color:#166534;margin-bottom:4px;}
.shipped-banner-sub{font-size:13px;color:#16a34a;}
.back-to-dash-btn{display:block;width:calc(100% - 32px);margin:14px 16px 0;padding:15px;font-size:15px;font-weight:600;border:1px solid #22c55e;border-radius:12px;background:#fff;color:#16a34a;cursor:pointer;text-align:center;font-family:inherit;}
.back-to-dash-btn:active{background:#f0fdf4;}

/* Validate bar */
.validate-sticky{position:sticky;bottom:0;background:#fff;border-top:1px solid #e5e5e5;padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom));}
.validate-btn{width:100%;padding:17px;font-size:17px;font-weight:600;border:1px solid #ddd;border-radius:14px;background:#fff;color:#111;cursor:pointer;font-family:inherit;transition:background 0.15s,color 0.15s,border-color 0.15s;}
.validate-btn:active{background:#f5f5f5;}
.validate-btn.all-packed{background:#22c55e;color:#fff;border-color:#22c55e;}
.val-hint{text-align:center;font-size:12px;color:#888;margin-top:8px;}
.spacer{height:130px;}
</style>
</head>
<body>

<div id="dashboard-screen" class="screen active">
  <div class="app-header">
    <div class="app-title">
      <span>P&amp;D</span>
      <button class="refresh-btn" onclick="renderDashboard()">&#8635; Refresh</button>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
  <div id="orders-panel"></div>
</div>

<div id="detail-screen" class="screen">
  <div class="detail-topbar">
    <button class="back-btn" onclick="goBack()">&#8592;</button>
    <div class="detail-topbar-info">
      <div class="detail-ref" id="d-ref"></div>
      <div class="detail-sub" id="d-so"></div>
    </div>
  </div>
  <div id="detail-content"></div>
</div>

<script>
const companies=[
  {id:'pup',name:'PUP',badgeClass:'badge-pup'},
  {id:'bf', name:'BF', badgeClass:'badge-bf'},
  {id:'wu', name:'WU', badgeClass:'badge-wu'},
  {id:'done',name:'Completed',badgeClass:'badge-done'},
];

let activeTab='pup';
let currentOrder=null;
let currentCompany=null;
const completedOrders=[];

const orders={
  pup:[
    {ref:'WH/OUT/00041',so:'S00089',customer:'Maria Torres',address:'1242 Elm St, Los Angeles CA 90001',pk:3,c:5,z:2,d:0,on:true,twoday:false,carrier:'UPS',done:false,
     products:[{name:'Wireless Headphones Pro',demand:2,packed:0},{name:'Phone Case Black',demand:3,packed:0},{name:'USB-C Cable 6ft',demand:4,packed:0},{name:'Screen Protector',demand:2,packed:0}]},
    {ref:'WH/OUT/00042',so:'S00091',customer:'James Liu',address:'800 Sunset Blvd, Hollywood CA 90028',pk:1,c:0,z:1,d:1,on:false,twoday:true,carrier:'FedEx',done:false,
     products:[{name:'Laptop Stand Aluminum',demand:1,packed:0},{name:'Mechanical Keyboard',demand:1,packed:0},{name:'Mouse Pad XL',demand:2,packed:0}]},
    {ref:'WH/OUT/00043',so:'S00094',customer:'Ana Reyes',address:'55 W 7th St, Los Angeles CA 90014',pk:2,c:3,z:0,d:0,on:false,twoday:false,carrier:'USPS',done:false,
     products:[{name:'Notebook A5 Pack',demand:3,packed:0},{name:'Pen Set Blue',demand:2,packed:0},{name:'Sticky Notes Multicolor',demand:4,packed:0},{name:'Highlighter Set',demand:2,packed:0}]},
    {ref:'WH/OUT/00044',so:'S00097',customer:'Robert Kim',address:'3200 Wilshire Blvd, LA CA 90010',pk:0,c:2,z:2,d:1,on:true,twoday:false,carrier:'DHL',done:false,
     products:[{name:'Bluetooth Speaker',demand:1,packed:0},{name:'Charging Dock',demand:1,packed:0},{name:'Cable Organizer',demand:3,packed:0}]},
  ],
  bf:[
    {ref:'BF/OUT/00018',so:'S00077',customer:'Derek Stone',address:'1900 N Vermont Ave, LA CA 90027',pk:0,c:8,z:3,d:2,on:true,twoday:false,carrier:'DHL',done:false,
     products:[{name:'Resistance Bands Set',demand:4,packed:0},{name:'Yoga Mat Purple',demand:2,packed:0},{name:'Water Bottle 32oz',demand:3,packed:0}]},
    {ref:'BF/OUT/00019',so:'S00081',customer:'Priya Nair',address:'3300 Wilshire Blvd, LA CA 90010',pk:4,c:2,z:0,d:0,on:false,twoday:false,carrier:'UPS',done:false,
     products:[{name:'Jump Rope Pro',demand:2,packed:0},{name:'Foam Roller',demand:1,packed:0},{name:'Gym Gloves M',demand:2,packed:0},{name:'Protein Shaker',demand:3,packed:0}]},
    {ref:'BF/OUT/00020',so:'S00085',customer:'Kevin Walsh',address:'470 S Figueroa St, LA CA 90071',pk:1,c:4,z:1,d:0,on:false,twoday:true,carrier:'FedEx',done:false,
     products:[{name:'Kettlebell 25lb',demand:1,packed:0},{name:'Ab Roller',demand:1,packed:0},{name:'Exercise Mat',demand:2,packed:0}]},
    {ref:'BF/OUT/00021',so:'S00088',customer:'Sandra Mejia',address:'1010 S Flower St, LA CA 90015',pk:2,c:1,z:2,d:1,on:true,twoday:false,carrier:'USPS',done:false,
     products:[{name:'Pull Up Bar',demand:1,packed:0},{name:'Resistance Loop Set',demand:3,packed:0},{name:'Cooling Towel',demand:2,packed:0},{name:'Sports Bottle',demand:2,packed:0}]},
  ],
  wu:[
    {ref:'WU/OUT/00007',so:'S00060',customer:'Carlos Vega',address:'400 S Spring St, LA CA 90013',pk:1,c:1,z:1,d:1,on:false,twoday:true,carrier:'FedEx',done:false,
     products:[{name:'Desk Organizer Set',demand:1,packed:0},{name:'Sticky Notes Pack',demand:3,packed:0},{name:'Pen Holder Bamboo',demand:1,packed:0}]},
    {ref:'WU/OUT/00008',so:'S00063',customer:'Lisa Park',address:'220 E 6th St, Los Angeles CA 90014',pk:2,c:0,z:2,d:0,on:true,twoday:false,carrier:'USPS',done:false,
     products:[{name:'Candle Set Vanilla',demand:2,packed:0},{name:'Gift Box Large',demand:2,packed:0},{name:'Ribbon Pack',demand:1,packed:0},{name:'Tissue Paper',demand:4,packed:0}]},
    {ref:'WU/OUT/00009',so:'S00067',customer:'Tom Brennan',address:'999 Alameda St, LA CA 90012',pk:0,c:4,z:0,d:3,on:false,twoday:false,carrier:'DHL',done:false,
     products:[{name:'Ceramic Mug Set',demand:4,packed:0},{name:'Tea Sampler Box',demand:1,packed:0},{name:'Honey Jar Set',demand:2,packed:0}]},
    {ref:'WU/OUT/00010',so:'S00071',customer:'Rachel Moore',address:'1600 N Highland Ave, Hollywood CA 90028',pk:1,c:2,z:1,d:0,on:false,twoday:true,carrier:'UPS',done:false,
     products:[{name:'Scented Lotion Set',demand:2,packed:0},{name:'Bath Bomb Pack',demand:3,packed:0},{name:'Face Mask Set',demand:2,packed:0},{name:'Lip Balm 4pk',demand:4,packed:0}]},
  ],
};

function pill(l,v){return '<span class="pack-pill'+(v>0?' has-value':'')+'">'+l+': '+v+'</span>';}

function renderDashboard(){renderTabs();renderPanel();}

function renderTabs(){
  document.getElementById('tabs').innerHTML=companies.map(co=>{
    const count=co.id==='done'?completedOrders.length:orders[co.id].filter(o=>!o.done).length;
    return '<div class="tab'+(activeTab===co.id?' active':'')+'" onclick="switchTab(\''+co.id+'\')">'+co.name+'<span class="tab-badge '+co.badgeClass+'">'+count+'</span></div>';
  }).join('');
}

function switchTab(id){activeTab=id;renderTabs();renderPanel();}
function renderPanel(){if(activeTab==='done')renderCompleted();else renderOrders();}

function renderOrders(){
  const list=orders[activeTab].filter(o=>!o.done);
  if(!list.length){
    document.getElementById('orders-panel').innerHTML='<div class="empty"><div class="empty-icon">&#10003;</div>All orders completed</div>';
    return;
  }
  document.getElementById('orders-panel').innerHTML='<div class="orders-wrap">'+list.map(o=>renderCard(o,activeTab)).join('')+'</div>';
}

function renderCompleted(){
  if(!completedOrders.length){
    document.getElementById('orders-panel').innerHTML='<div class="empty"><div class="empty-icon">&#128230;</div>No completed orders yet</div>';
    return;
  }
  document.getElementById('orders-panel').innerHTML=
    '<div class="completed-header"><span class="completed-title">'+completedOrders.length+' order'+(completedOrders.length!==1?'s':'')+' shipped</span><button class="export-btn" onclick="exportCSV()">&#8595; Export CSV</button></div>'+
    '<div class="orders-wrap">'+completedOrders.map(o=>renderCard(o,'done')).join('')+'</div>';
}

function renderCard(o,companyId){
  const flags=[o.on?'<span class="flag-on">ON</span>':'',o.twoday?'<span class="flag-2day">2DAY</span>':''].filter(Boolean).join('');
  const confirmed=o.products.filter(p=>p.packed===p.demand).length;
  const total=o.products.length;
  const isDone=companyId==='done';
  const progressNote=confirmed>0&&!isDone?'<span class="progress-note">'+confirmed+'/'+total+' packed</span>':'<span class="progress-note"></span>';
  return '<div class="order-card'+(isDone?' shipped':'')+'">'+
    '<div class="order-row1"><div><div class="order-ref">'+o.ref+'</div><div class="order-so">'+o.so+'</div></div><div class="flags">'+flags+'</div></div>'+
    '<div class="order-customer">'+o.customer+'</div>'+
    '<div class="order-address">'+o.address+'</div>'+
    '<div class="carrier-line"><span class="carrier-dot"></span>'+o.carrier+'</div>'+
    '<div class="packing-pills">'+pill('PK',o.pk)+pill('C',o.c)+pill('Z',o.z)+pill('D',o.d)+'</div>'+
    '<div class="card-footer">'+
    (isDone?'<span class="progress-note"></span><span class="shipped-badge">Shipped</span>':
      progressNote+'<button class="view-btn" onclick="openDetail(\''+companyId+'\',\''+o.ref+'\')">View &rarr;</button>')+
    '</div></div>';
}

function openDetail(companyId,ref){
  currentCompany=companyId;
  currentOrder=orders[companyId].find(o=>o.ref===ref);
  const o=currentOrder;
  document.getElementById('d-ref').textContent=o.ref;
  document.getElementById('d-so').textContent=o.so+' · '+companyId.toUpperCase();
  renderDetail();
  document.getElementById('dashboard-screen').classList.remove('active');
  document.getElementById('detail-screen').classList.add('active');
  window.scrollTo(0,0);
}

function goBack(){
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('dashboard-screen').classList.add('active');
  renderDashboard();
}

function renderDetail(){
  const o=currentOrder;
  const confirmed=o.products.filter(p=>p.packed===p.demand).length;
  const total=o.products.length;
  const allPacked=confirmed===total;
  const pct=Math.round((confirmed/total)*100);
  const flags=[o.on?'<span class="flag-on">ON &mdash; Overnight</span>':'',o.twoday?'<span class="flag-2day">2DAY &mdash; 2-Day</span>':''].filter(Boolean).join('');

  document.getElementById('detail-content').innerHTML=
    (o.done?
      '<div class="shipped-banner"><div class="shipped-banner-icon">&#10003;</div><div class="shipped-banner-title">Order Shipped</div><div class="shipped-banner-sub">'+o.ref+' moved to Completed.</div></div>'+
      '<button class="back-to-dash-btn" onclick="goBack()">&#8592; Back to P&amp;D</button>':'')+
    '<div class="info-card">'+
      '<div class="info-row"><span class="info-label">Customer</span><span class="info-value">'+o.customer+'</span></div>'+
      '<div class="info-row"><span class="info-label">Address</span><span class="info-value">'+o.address+'</span></div>'+
      '<div class="info-row"><span class="info-label">Carrier</span><span class="info-value"><span class="carrier-badge"><span style="width:7px;height:7px;border-radius:50%;background:#3b82f6;display:inline-block;"></span>'+o.carrier+'</span></span></div>'+
      (flags?'<div class="flags-row">'+flags+'</div>':'')+
      '<div class="pills-row">'+pill('PK',o.pk)+pill('C',o.c)+pill('Z',o.z)+pill('D',o.d)+'</div>'+
    '</div>'+
    '<div class="section-label">Items to pack</div>'+
    '<div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:'+pct+'%"></div></div>'+
    '<div class="product-list-wrap">'+o.products.map((p,i)=>renderProductRow(p,i,o.done)).join('')+'</div>'+
    (!o.done?
      '<div class="spacer"></div>'+
      '<div class="validate-sticky">'+
        '<button class="validate-btn'+(allPacked?' all-packed':'')+'" id="val-btn" onclick="validateOrder()">Validate &amp; Ship</button>'+
        '<div class="val-hint" id="val-hint">'+(allPacked?'All items confirmed &mdash; ready to go':'Use + to count each item, then validate')+'</div>'+
      '</div>':
      '<div style="height:32px;"></div>');
}

function renderProductRow(p,i,locked){
  const isPacked=p.packed===p.demand;
  if(locked){
    return '<div class="product-row packed-row">'+
      '<div class="prod-info"><div class="prod-name">'+p.name+'</div><div class="prod-need">Packed: '+p.packed+' of '+p.demand+'</div></div>'+
      '<div class="qty-display"><span class="qty-val full">'+p.packed+'</span><span class="qty-of">of '+p.demand+'</span></div>'+
    '</div>';
  }
  return '<div class="product-row'+(isPacked?' packed-row':'')+'" id="prow-'+i+'">'+
    '<div class="prod-info"><div class="prod-name">'+p.name+'</div><div class="prod-need">Need: '+p.demand+'</div></div>'+
    '<div class="qty-control">'+
      '<button class="qty-btn" onclick="changeQty('+i+',-1)" id="minus-'+i+'" '+(p.packed===0?'disabled':'')+'>&#8722;</button>'+
      '<div class="qty-display"><span class="qty-val '+(p.packed===0?'':'')+(isPacked?'full':'')+'" id="qty-'+i+'">'+p.packed+'</span><span class="qty-of">of '+p.demand+'</span></div>'+
      '<button class="qty-btn" onclick="changeQty('+i+',1)" id="plus-'+i+'" '+(isPacked?'disabled':'')+'>+</button>'+
    '</div>'+
  '</div>';
}

function changeQty(i,delta){
  const p=currentOrder.products[i];
  p.packed=Math.max(0,Math.min(p.demand,p.packed+delta));
  const isPacked=p.packed===p.demand;
  const qtyEl=document.getElementById('qty-'+i);
  qtyEl.textContent=p.packed;
  qtyEl.className='qty-val'+(isPacked?' full':'');
  const row=document.getElementById('prow-'+i);
  if(isPacked)row.classList.add('packed-row');else row.classList.remove('packed-row');
  document.getElementById('minus-'+i).disabled=p.packed===0;
  document.getElementById('plus-'+i).disabled=isPacked;
  updateProgress();
}

function updateProgress(){
  const confirmed=currentOrder.products.filter(p=>p.packed===p.demand).length;
  const total=currentOrder.products.length;
  const allPacked=confirmed===total;
  const pct=Math.round((confirmed/total)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  const btn=document.getElementById('val-btn');
  if(allPacked)btn.classList.add('all-packed');else btn.classList.remove('all-packed');
  document.getElementById('val-hint').innerHTML=allPacked?'All items confirmed &mdash; ready to go':'Use + to count each item, then validate';
}

function validateOrder(){
  currentOrder.done=true;
  completedOrders.unshift(currentOrder);
  window.scrollTo(0,0);
  renderDetail();
}

function exportCSV(){
  const headers=['Order Ref','SO Number','Company','Customer Name','Shipping Address','Carrier','Products','Overnight','2-Day'];
  const rows=completedOrders.map(o=>{
    const productList=o.products.map(p=>p.name+' x'+p.demand).join(' | ');
    const company=o.ref.split('/')[0];
    return [o.ref,o.so,company,o.customer,'"'+o.address+'"',o.carrier,'"'+productList+'"',o.on?'Yes':'No',o.twoday?'Yes':'No'].join(',');
  });
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='p_and_d_completed_'+new Date().toISOString().slice(0,10)+'.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

renderDashboard();
</script>
</body>
